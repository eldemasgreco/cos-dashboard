<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chief of Staff OS — Nick</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
:root{
  --green:#2D5F3E;--green-2:#3E7A50;--red:#C0324A;--amber:#C97A0A;--blue:#2563EB;
  --ink:#111418;--ink-2:#2B3139;--muted:#5B6470;--line:#E3E6EA;--soft:#F3F5F7;--paper:#FAFBFC;
  --bg:#F6F7F9;--card:#FFFFFF;--shadow:0 1px 2px rgba(17,20,24,.04),0 2px 12px rgba(17,20,24,.05);
  --left-w:292px;--right-w:408px;--hdr-h:52px;
  --badge-green:#1F7A3A;--badge-red:#B31E34;--badge-amber:#C26A00;--badge-blue:#2150D1;--badge-gray:#6B7684;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5}
body{min-height:100vh;padding-top:var(--hdr-h)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;background:none;border:0;color:inherit;padding:0}

/* HEADER */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr-h);background:#FFF;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;gap:14px;z-index:50}
.hdr-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px;letter-spacing:.2px}
.hdr-brand .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(45,95,62,.18)}
.hdr-center{flex:1;display:flex;align-items:center;gap:10px;justify-content:center}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:500;background:var(--soft);color:var(--ink-2)}
.pill .sw{width:6px;height:6px;border-radius:50%;background:var(--muted)}
.pill.ok .sw{background:var(--green)}.pill.warn .sw{background:var(--amber)}.pill.err .sw{background:var(--red)}
.live-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;background:#EAF5EE;color:var(--green);cursor:pointer;user-select:none;border:1px solid #CFE5D5}
.live-pill.paused{background:#FDEDEF;color:var(--red);border-color:#F2C8CF}
.live-pill .lv{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.live-pill.paused .lv{background:var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hdr-right{display:flex;align-items:center;gap:10px}
.tz-wrap{position:relative}
.tz-btn{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;font-size:12px;background:var(--soft);color:var(--ink-2);border:1px solid var(--line)}
.tz-btn:hover{background:#EBEEF2}
.tz-dd{position:absolute;top:34px;right:0;min-width:220px;background:#FFF;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:4px;display:none;z-index:60;max-height:320px;overflow:auto}
.tz-dd.open{display:block}
.tz-opt{padding:8px 10px;border-radius:6px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.tz-opt:hover{background:var(--soft)}.tz-opt.sel{background:#E8EEF9;color:var(--blue);font-weight:600}
.hdr-time{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:64px;text-align:right}
.hdr-btn{padding:4px 10px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid var(--line);background:#FFF;color:var(--ink-2)}
.hdr-btn:hover{background:var(--soft)}
.hdr-btn-sync{background:#EAF5EE;color:var(--green);border-color:#CFE5D5}.hdr-btn-sync:hover{background:#D9ECDF}

/* GRID */
.main{display:grid;grid-template-columns:var(--left-w) 1fr var(--right-w);gap:12px;padding:12px;max-width:1600px;margin:0 auto;align-items:start}
.col{display:flex;flex-direction:column;gap:12px}

/* CARD */
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--line);background:#FDFDFE}
.card-title{font-size:12px;font-weight:700;letter-spacing:.4px;color:var(--ink-2);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.card-hdr-r{display:flex;align-items:center;gap:8px}
.card-body{padding:12px 14px}
.mb-20{margin-bottom:20px}

/* BADGES */
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:20px;padding:0 7px;border-radius:999px;font-size:11px;font-weight:600;background:var(--soft);color:var(--muted)}
.badge-green{background:#E7F3EC;color:var(--badge-green)}
.badge-red{background:#FCE9EC;color:var(--badge-red)}
.badge-amber{background:#FDF0D9;color:var(--badge-amber)}
.badge-blue{background:#E3EBFB;color:var(--badge-blue)}
.badge-gray{background:var(--soft);color:var(--badge-gray)}

/* ICON BUTTON */
.ibtn{width:24px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px}
.ibtn:hover{background:var(--soft);color:var(--ink-2)}

/* LEFT COL — WEATHER */
.wx-card{padding:14px}
.wx-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.wx-temp{font-size:42px;font-weight:600;line-height:1;letter-spacing:-1px;color:var(--ink)}
.wx-cond{font-size:13px;color:var(--muted);margin-top:2px}
.wx-hl{font-size:12px;color:var(--muted);text-align:right;line-height:1.4}
.wx-hl b{color:var(--ink-2);font-weight:600}
.weather-loc{font-size:11px;color:var(--muted);margin-top:10px;text-transform:uppercase;letter-spacing:.4px}

/* LEFT COL — MARKETS */
.mkt-list{display:flex;flex-direction:column;gap:2px}
.mkt-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:12px}
.mkt-row .sym{font-weight:600;color:var(--ink-2)}
.mkt-row .val{font-variant-numeric:tabular-nums;color:var(--ink-2);font-weight:500}
.mkt-row .delta{font-size:11px;font-weight:600;min-width:48px;text-align:right}
.mkt-row .delta.up{color:var(--badge-green)}.mkt-row .delta.down{color:var(--badge-red)}.mkt-row .delta.flat{color:var(--muted)}

/* CENTER — HERO BRIEF */
.hero{padding:16px 18px}
.hero-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.hero-title{font-size:14px;font-weight:700;color:var(--ink)}
.brief-summary-line{font-size:13px;color:var(--ink-2);line-height:1.5;cursor:pointer}
.brief-summary-chev{display:inline-block;margin-right:6px;color:var(--muted);transition:transform .15s}
.brief-summary-chev.open{transform:rotate(90deg)}
.ai-brief-narrative{font-size:13.5px;color:var(--ink-2);line-height:1.55;margin-top:8px}
.brief-details{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
#brief-topics-container{margin-top:10px}
.brief-chat{margin-top:12px;display:flex;gap:8px;align-items:center;border-top:1px solid var(--line);padding-top:10px}
.brief-chat input{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;background:var(--paper)}
.brief-chat input:focus{outline:none;border-color:var(--blue);background:#FFF}
.brief-chat-send{padding:7px 12px;border-radius:8px;background:var(--ink);color:#FFF;font-size:12px;font-weight:600}
#brief-chat-reply{margin-top:8px;padding:8px 10px;background:var(--soft);border-radius:8px;font-size:12.5px;color:var(--ink-2)}

/* ALERTS */
.alerts-bar{border-left:3px solid var(--red);background:#FEF5F7}
.alerts-bar .card-hdr{background:#FEF5F7;border-bottom-color:#F4D8DE;cursor:pointer}
.alerts-body{padding:0 14px 10px}
.alerts-bar.collapsed .alerts-body{display:none}

/* SCHEDULE TABS */
.sched-tabs{display:flex;gap:4px;padding:2px;background:var(--soft);border-radius:8px}
.sched-tab{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.3px}
.sched-tab.active{background:#FFF;color:var(--ink-2);box-shadow:var(--shadow)}
.sched-view{display:none;padding:10px 14px 14px}.sched-view.active{display:block}

/* RIGHT COL — TABS */
.rail{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;position:sticky;top:calc(var(--hdr-h) + 12px)}
.rail-tabs{display:flex;border-bottom:1px solid var(--line);background:#FDFDFE}
.rail-tab{flex:1;padding:10px 4px;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:5px;border-bottom:2px solid transparent;cursor:pointer}
.rail-tab:hover{color:var(--ink-2)}
.rail-tab.active{color:var(--ink);border-bottom-color:var(--green)}
.rail-pane{display:none;max-height:calc(100vh - var(--hdr-h) - 80px);overflow-y:auto}
.rail-pane.active{display:block}

/* COMM TABS (inside Comms pane) */
.comm-tabs{display:flex;gap:4px;padding:10px 14px 4px}
.comm-tab{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;color:var(--muted);background:var(--soft)}
.comm-tab.active{background:var(--ink);color:#FFF}
.comm-section{display:none;padding:8px 14px 12px}.comm-section.active{display:block}

/* TASK RING (inside tasks body) */
.task-ring-wrap{display:flex;align-items:center;justify-content:center;gap:18px;padding:8px 0 12px}
.task-ring-svg{transform:rotate(-90deg)}
.task-ring-text{position:absolute;font-size:14px;font-weight:700;color:var(--ink)}
.task-ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
.task-summary{font-size:12px;color:var(--muted);line-height:1.5}
.task-summary b{color:var(--ink);font-weight:600}

/* NEXT UP */
.next-up-inline{padding:10px 14px;background:#F5FAF7;border:1px dashed #CFE5D5;border-radius:8px;margin:0 14px 12px;font-size:12.5px;color:var(--ink-2)}

/* SUGGESTED */
#suggested-tasks-card .card-hdr{background:#F7F5FC}

/* PIPELINE STATE (hidden) */
#__pipelineState{display:none !important}

/* FAB + ELLY PANEL */
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--ink);color:#FFF;font-size:24px;box-shadow:0 4px 16px rgba(17,20,24,.25);z-index:70;display:flex;align-items:center;justify-content:center}
.fab:hover{background:#000}
.elly-panel{position:fixed;bottom:92px;right:24px;width:380px;max-height:70vh;background:#FFF;border:1px solid var(--line);border-radius:14px;box-shadow:0 10px 30px rgba(17,20,24,.18);z-index:69;display:none;flex-direction:column}
.elly-panel.open{display:flex}
.elly-hdr{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.elly-hdr h3{margin:0;font-size:14px;font-weight:700}
.elly-body{padding:10px 14px;overflow-y:auto;flex:1;min-height:120px}
.cap-row{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.cap-input{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;background:var(--paper)}
.cap-input:focus{outline:none;border-color:var(--green);background:#FFF}
.cap-count{font-size:11px;color:var(--muted);padding:4px 8px;background:var(--soft);border-radius:999px;white-space:nowrap}

/* DRAWER */
.drawer{position:fixed;top:0;right:0;bottom:0;width:520px;max-width:95vw;background:#FFF;border-left:1px solid var(--line);box-shadow:-10px 0 30px rgba(17,20,24,.08);z-index:80;transform:translateX(100%);transition:transform .2s ease}
.drawer.open{transform:translateX(0)}
.drawer-hdr{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.drawer-body{padding:14px 18px;overflow-y:auto;height:calc(100% - 52px)}
.drawer-back{position:fixed;inset:0;background:rgba(17,20,24,.24);z-index:79;display:none}
.drawer-back.open{display:block}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#FFF;padding:10px 18px;border-radius:8px;font-size:13px;box-shadow:var(--shadow);z-index:90;opacity:0;pointer-events:none;transition:all .2s ease}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* RESPONSIVE */
@media (max-width:1200px){.main{grid-template-columns:var(--left-w) 1fr;}.col.right-col .rail{position:relative;top:0}.col.right-col{grid-column:1 / -1}}
@media (max-width:860px){.main{grid-template-columns:1fr;}.col.left-col,.col.right-col{grid-column:1 / -1}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-brand"><span class="dot"></span>Chief of Staff OS</div>
  <div class="hdr-center">
    <span class="pill ok" id="pill-scenarios"><span class="sw"></span><span id="pill-scenarios-txt">— scenarios</span></span>
    <span class="pill" id="pill-errors"><span class="sw"></span><span id="pill-errors-txt">— errors</span></span>
    <span class="pill" id="pill-lastrun"><span class="sw"></span><span id="pill-lastrun-txt">—</span></span>
    <span class="live-pill" id="livePill" onclick="toggleLive()" title="Toggle Elly on/off"><span class="lv"></span><span id="livePillTxt">Live</span></span>
  </div>
  <div class="hdr-right">
    <button class="hdr-btn hdr-btn-sync" id="syncBtn" onclick="syncCompletions()" title="Flush pending task completions + quick captures to COS.">Sync</button>
    <button class="hdr-btn" id="refreshBtn" onclick="cosAction('refresh')" title="Rebuild the whole dashboard">&#8635; Refresh</button>
    <button class="hdr-btn" id="stopBtn" onclick="cosAction('stop')" title="Pause Elly">Stop</button>
    <button class="hdr-btn" id="resumeBtn" onclick="cosAction('resume')" title="Resume Elly" style="display:none">Resume</button>
    <div class="tz-wrap">
      <button class="tz-btn" id="tzBtn" onclick="toggleTz(event)" title="Timezone"><span id="tzLabel">Europe/Madrid</span><span>&#9662;</span></button>
      <div class="tz-dd" id="tzDD"></div>
    </div>
    <div class="hdr-time" id="hdrTime">--:--</div>
  </div>
</header>

<main class="main">

<div class="col left-col">

  <div class="card wx-card">
    <div class="card-hdr" style="border-bottom:0;padding:4px 0 10px"><div class="card-title">Weather</div><div class="card-hdr-r"><button class="ibtn" onclick="cosAction('refresh_weather')" title="Refresh weather">&#8635;</button></div></div>
    <div class="wx-top">
      <div><div class="wx-temp" id="wxTemp">—</div><div class="wx-cond" id="wxCond">—</div></div>
      <div class="wx-hl"><div>H <b id="wxHi">—</b></div><div>L <b id="wxLo">—</b></div></div>
    </div>
    <div class="weather-loc" id="weather-loc">—</div>
  </div>

  <div class="card">
    <div class="card-hdr"><div class="card-title">Markets</div><div class="card-hdr-r"><button class="ibtn" onclick="cosAction('refresh_markets')" title="Refresh markets">&#8635;</button></div></div>
    <div class="card-body"><div class="mkt-list" id="markets-sidebar"></div></div>
  </div>

  <div class="card">
    <div class="card-hdr"><div class="card-title">Commodities</div><div class="card-hdr-r"><button class="ibtn" onclick="cosAction('refresh_ag')" title="Refresh ag">&#8635;</button></div></div>
    <div class="card-body"><div class="mkt-list" id="commodities-sidebar"></div></div>
  </div>

  <div class="card">
    <div class="card-hdr"><div class="card-title">News</div><div class="card-hdr-r"><button class="ibtn" onclick="cosAction('refresh_news')" title="Refresh news">&#8635;</button></div></div>
    <div class="card-body"><div id="news-sidebar"></div></div>
  </div>

</div>

<div class="col center-col">

  <div class="card">
    <div class="card-hdr"><div class="card-title">Daily Brief <span class="badge badge-green" id="brief-time">—</span></div><div class="card-hdr-r"><button class="ibtn" onclick="cosAction('refresh')" title="Rebuild brief">&#8635;</button></div></div>
    <div class="hero">
      <div class="hero-top"><div class="hero-title">Today</div></div>
      <div class="brief-summary-line" onclick="toggleBriefExpand()"><span class="brief-summary-chev" id="brief-summary-chev">&#9656;</span><span id="brief-summary-line">Tap to expand narrative...</span></div>
      <div class="ai-brief-narrative" id="brief-narrative" style="display:none"></div>
      <div class="brief-details" id="brief-details" style="display:none"></div>
      <div id="brief-topics-container"></div>
      <div class="brief-chat">
        <input type="text" id="brief-chat-msg" name="ask-elly-q" placeholder="Ask about today, projects, markets, people..." autocomplete="off" autocorrect="off" autocapitalize="off" onkeydown="if(event.key==='Enter'){briefChat();return false;}">
        <button class="brief-chat-send" onclick="briefChat()">Ask</button>
      </div>
      <div id="brief-chat-reply" style="display:none;"></div>
    </div>
  </div>

  <div class="next-up-inline" id="next-up-card"></div>

  <div class="card">
    <div class="card-hdr"><div class="card-title">Priorities</div><div class="card-hdr-r"><span class="badge badge-green" id="pri-badge">—</span></div></div>
    <div class="card-body" id="priorities-body"></div>
  </div>

  <div class="card mb-20" id="suggested-tasks-card" style="display:none">
    <div class="card-hdr"><div class="card-title">AI Suggested <span class="badge badge-blue" id="suggested-count">—</span></div></div>
    <div class="card-body" id="suggested-body"></div>
  </div>

  <div class="card alerts-bar expanded" id="alerts-bar">
    <div class="card-hdr" onclick="toggleAlerts()"><div class="card-title">Alerts <span class="badge badge-red" id="alert-count">—</span></div><div class="card-hdr-r"><span class="ibtn" title="Toggle">&#9662;</span></div></div>
    <div class="alerts-body" id="alerts-body"></div>
  </div>

  <div class="card">
    <div class="card-hdr"><div class="card-title">Schedule</div><div class="card-hdr-r">
      <div class="sched-tabs">
        <button class="sched-tab active" onclick="switchSchedView('day', this)">DAY</button>
        <button class="sched-tab" onclick="switchSchedView('week', this)">WEEK</button>
        <button class="sched-tab" onclick="switchSchedView('month', this)">MONTH</button>
        <button class="sched-tab" onclick="switchSchedView('quarter', this)">QTR</button>
      </div>
    </div></div>
    <div id="sched-day" class="sched-view active"></div>
    <div id="sched-week" class="sched-view"></div>
    <div id="sched-month" class="sched-view"></div>
    <div id="sched-quarter" class="sched-view"></div>
  </div>

</div>

<div class="col right-col">

  <div class="rail">
    <div class="rail-tabs">
      <button class="rail-tab active" data-pane="p-tasks" onclick="switchRail(event)">Tasks <span class="badge badge-green" id="task-badge">—</span></button>
      <button class="rail-tab" data-pane="p-projects" onclick="switchRail(event)">Projects</button>
      <button class="rail-tab" data-pane="p-comms" onclick="switchRail(event)">Comms <span class="badge badge-amber" id="comms-badge">—</span></button>
      <button class="rail-tab" data-pane="p-waiting" onclick="switchRail(event)">Waiting <span class="badge badge-amber" id="wait-count">—</span></button>
      <button class="rail-tab" data-pane="p-signals" onclick="switchRail(event)">Signals <span class="badge badge-gray" id="signal-count">—</span></button>
    </div>
    <div class="rail-pane active" id="p-tasks"><div class="card-body" id="tasks-body"></div></div>
    <div class="rail-pane" id="p-projects"><div class="card-body" id="projects-body"></div></div>
    <div class="rail-pane" id="p-comms">
      <div class="comm-tabs">
        <button class="comm-tab active" data-section="comm-gmail" onclick="switchCommTab(event)">Gmail</button>
        <button class="comm-tab" data-section="comm-afsh" onclick="switchCommTab(event)">AFSH</button>
        <button class="comm-tab" data-section="comm-illume" onclick="switchCommTab(event)">Illume</button>
        <button class="comm-tab" data-section="comm-wa" onclick="switchCommTab(event)">WA</button>
      </div>
      <div class="card-body" id="comms-body">
        <div class="comm-section active" id="comm-gmail"></div>
        <div class="comm-section" id="comm-afsh"></div>
        <div class="comm-section" id="comm-illume"></div>
        <div class="comm-section" id="comm-wa"></div>
      </div>
    </div>
    <div class="rail-pane" id="p-waiting"><div class="card-body" id="waiting-body"></div></div>
    <div class="rail-pane" id="p-signals"><div class="card-body" id="signals-body"></div></div>
  </div>

</div>

</main>

<!-- Pipeline state (hidden) -->
<div id="__pipelineState" style="display:none" data-completions="[]" data-captures="[]" data-refresh="" data-version="v15" data-last-modified=""></div>

<!-- FAB -->
<button class="fab" id="fabBtn" onclick="toggleEllyPanel()" title="Quick Capture">+</button>

<!-- Elly panel with Quick Capture -->
<aside class="elly-panel" id="ellyPanel">
  <div class="elly-hdr"><h3>Quick Capture</h3><button class="ibtn" onclick="toggleEllyPanel()">&#10005;</button></div>

function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function entityClass(e) {
    if (!e) return '';
    var l = e.toLowerCase();
    if (l.includes('afsh') || l.includes('alliance')) return 'entity-afsh';
    if (l.includes('illume')) return 'entity-illume';
    if (l.includes('spade')) return 'entity-spade';
    if (l.includes('logos')) return 'entity-logos';
    if (l.includes('personal')) return 'entity-personal';
    return '';
}

function entityColor(e) {
    if (!e) return '#9CA3AF';
    var l = e.toLowerCase();
    if (l.includes('afsh')) return '#3B82F6';
    if (l.includes('illume')) return '#2D5F3E';
    if (l.includes('spade')) return '#111';
    if (l.includes('logos')) return '#8B5CF6';
    return '#9CA3AF';
}

function initials(name) {
    if (!name) return '?';
    var parts = name.split(' ');
    if (parts.length >= 2) return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
    return name.substring(0,2).toUpperCase();
}

function sparkSVG(data, color) {
    if (!data || !data.length) return '';
    var max = Math.max.apply(null, data);
    var min = Math.min.apply(null, data);
    var range = max - min || 1;
    var html = '<span class="mkt-spark">';
    data.forEach(function(v) {
        var h = Math.max(3, Math.round(((v - min) / range) * 14));
        html += '<span class="spark-bar" style="height:' + h + 'px;background:' + color + ';opacity:0.35"></span>';
    });
    // last bar full opacity
    html = html.replace(/opacity:0\.35"><\/span>$/, 'opacity:1"></span>');
    html += '</span>';
    return html;
}

function parseTime12(t) {
    if (!t) return null;
    // Try 12-hour format first: "10:30 AM"
    var m = t.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
    if (m) {
        var h = parseInt(m[1],10), min = parseInt(m[2],10);
        if (m[3].toUpperCase() === 'PM' && h !== 12) h += 12;
        if (m[3].toUpperCase() === 'AM' && h === 12) h = 0;
        return h * 60 + min;
    }
    // Try 24-hour format: "07:30", "22:30"
    var m24 = t.match(/(\d{1,2}):(\d{2})/);
    if (m24) {
        return parseInt(m24[1],10) * 60 + parseInt(m24[2],10);
    }
    return null;
}

function renderScheduleDay(d) {
    var body = document.getElementById('sched-day');
    if (!body) return;
    var s = d.schedule || {};
    var today = s.today || [];
    var tomorrow = s.tomorrow || [];
    if (!today.length && !tomorrow.length) { body.innerHTML = '<div class="empty">No events</div>'; return; }

    var now = new Date();
    var nowMin = now.getHours() * 60 + now.getMinutes();

    function renderList(events, cls) {
        return events.map(function(ev) {
            var startMin = parseTime12(ev.time);
            var isPast = (startMin !== null && startMin < (nowMin - 30));
            var isNow = (startMin !== null && startMin >= (nowMin - 15) && startMin <= (nowMin + 45));
            var dot = ev.type === 'personal' ? 'var(--purple)' : entityColor(ev.entity);
            var timeTxt = ev.time + (ev.end ? '–' + ev.end : '');
            var meta = ev.attendees ? ' <span class="sched-list-meta">' + esc(ev.attendees) + '</span>' : '';
            var classes = 'sched-list-item';
            if (cls) classes += ' ' + cls;
            if (isPast) classes += ' past';
            if (isNow) classes += ' now';
            return '<div class="' + classes + '">' +
                '<span class="sched-list-dot" style="background:' + dot + '"></span>' +
                '<span class="sched-list-time">' + esc(timeTxt) + '</span>' +
                '<span class="sched-list-title">' + esc(ev.title) + meta + '</span>' +
                '</div>';
        }).join('');
    }

    var html = '';
    if (today.length) {
        var visible = today.slice(0, 6);
        var rest = today.slice(6);
        html += '<div class="sched-list-label">Today <span class="sched-list-count">' + today.length + '</span></div>';
        html += '<div class="sched-list">' + renderList(visible, '') + '</div>';
        if (rest.length) {
            html += '<div class="sched-list-more" onclick="var el=this.nextElementSibling;var open=el.style.display!==\'none\';el.style.display=open?\'none\':\'block\';this.textContent=(open?\'+ \':\'- \')+\'' + rest.length + ' more today\';">+ ' + rest.length + ' more today</div>';
            html += '<div class="sched-list" style="display:none;">' + renderList(rest, '') + '</div>';
        }
    }
    if (tomorrow.length) {
        html += '<div class="sched-list-more tomorrow-toggle" onclick="var el=this.nextElementSibling;var open=el.style.display!==\'none\';el.style.display=open?\'none\':\'block\';this.textContent=(open?\'+ \':\'- \')+\'Tomorrow (' + tomorrow.length + ')\';">+ Tomorrow (' + tomorrow.length + ')</div>';
        html += '<div class="sched-list" style="display:none;">' + renderList(tomorrow, 'tomorrow') + '</div>';
    }
    body.innerHTML = html;
}

function renderScheduleWeek(d) {
    var body = document.getElementById('sched-week');
    if (!body) return;
    var week = (d.schedule || {}).week || [];
    if (!week.length) { body.innerHTML = '<div class="empty">No week data</div>'; return; }

    var now = new Date();
    var todayDay = now.toLocaleDateString('en-US', {weekday:'short'}).substring(0,3);

    var html = '<div class="week-grid-fan">';
    week.forEach(function(day) {
        var isToday = day.day === todayDay;
        var dateNum = day.date.split(' ')[1] || day.date;
        html += '<div class="week-col' + (isToday ? ' is-today' : '') + '">' +
            '<div class="week-col-hdr">' +
            '<div class="week-col-day">' + esc(day.day) + '</div>' +
            '<div class="week-col-num">' + esc(dateNum) + '</div>' +
            '</div>';
        (day.events || []).forEach(function(ev) {
            var isPersonal = /volleyball|futbol|mma|tutoring|bday/i.test(ev);
            html += '<div class="week-event-pill' + (isPersonal ? ' personal' : ' work') + '">' + esc(ev) + '</div>';
        });
        html += '</div>';
    });
    html += '</div>';
    body.innerHTML = html;
}

function renderScheduleMonth(d) {
    var body = document.getElementById('sched-month');
    if (!body) return;
    var events = (d.schedule || {}).month_events || [];

    var now = d.generated_at ? new Date(d.generated_at) : new Date();
    var year = now.getFullYear();
    var month = now.getMonth();
    var firstDay = new Date(year, month, 1).getDay();
    var daysInMonth = new Date(year, month + 1, 0).getDate();
    var todayDate = now.getDate();

    var eventDates = {};
    events.forEach(function(ev) {
        var d2 = new Date(ev.date);
        if (d2.getMonth() === month) eventDates[d2.getDate()] = ev.title;
    });

    var monthName = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    var html = '<div style="font-size:14px;font-weight:700;text-align:center;margin-bottom:12px;">' + monthName + '</div>';
    html += '<div class="month-grid">';

    var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    days.forEach(function(d2) { html += '<div class="month-hdr">' + d2 + '</div>'; });

    for (var i = 0; i < firstDay; i++) html += '<div class="month-cell"></div>';

    for (var day = 1; day <= daysInMonth; day++) {
        var cls = 'month-cell active';
        if (day === todayDate) cls += ' today';
        if (eventDates[day]) cls += ' has-event';
        html += '<div class="' + cls + '" title="' + (eventDates[day] ? esc(eventDates[day]) : '') + '">' + day + '</div>';
    }
    html += '</div>';

    // Event list below calendar
    if (events.length) {
        html += '<div style="margin-top:12px;">';
        events.forEach(function(ev) {
            var d2 = new Date(ev.date);
            var dateStr = d2.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            html += '<div style="font-size:11px;padding:3px 0;color:var(--text-secondary);">' +
                '<span style="font-weight:600;color:var(--text-primary);min-width:50px;display:inline-block;">' + dateStr + '</span> ' +
                esc(ev.title) + '</div>';
        });
        html += '</div>';
    }
    body.innerHTML = html;
}

function renderTasks(d) {
    var body = document.getElementById('tasks-body');
    var badgeEl = document.getElementById('task-badge');
    if (!body) return;
    var tasks = d.tasks || [];
    var high = tasks.filter(function(t) { return t.priority === 'high'; });
    var normal = tasks.filter(function(t) { return t.priority !== 'high'; });
    var doneCount = tasks.filter(function(t) { return t.done; }).length;

    if (badgeEl) badgeEl.textContent = doneCount + '/' + tasks.length;

    // Ring visual
    var pct = tasks.length > 0 ? Math.round((doneCount / tasks.length) * 100) : 0;
    var circumference = 2 * Math.PI * 24;
    var offset = circumference - (pct / 100) * circumference;

    var html = '<div class="task-visual">' +
        '<div class="task-ring-wrap">' +
        '<svg viewBox="0 0 56 56"><circle class="task-ring-bg" cx="28" cy="28" r="24"></circle>' +
        '<circle class="task-ring-fill" cx="28" cy="28" r="24" stroke-dasharray="' + circumference + '" stroke-dashoffset="' + offset + '"></circle></svg>' +
        '<div class="task-ring-text" id="taskRingText">' + pct + '%</div></div>' +
        '<div class="task-summary">' +
        '<div class="task-summary-line"><b>' + doneCount + '</b> of <b>' + tasks.length + '</b> completed</div>' +
        '<div class="task-summary-line"><b>' + high.length + '</b> critical items</div>' +
        '</div></div>';

    if (high.length) {
        html += '<div class="task-group"><div class="task-group-title">Critical</div>';
        high.forEach(function(t) {
            html += '<div class="task-item">' +
                '<input type="checkbox" id="' + esc(t.id) + '"' + (t.done ? ' checked' : '') + '>' +
                '<label for="' + esc(t.id) + '">' + esc(t.title) + '</label>' +
                '<span class="task-entity-dot" style="background:' + entityColor(t.entity) + '"></span></div>';
        });
        html += '</div>';
    }
    if (normal.length) {
        html += '<div class="task-group"><div class="task-group-title">This Week</div>';
        normal.forEach(function(t) {
            html += '<div class="task-item">' +
                '<input type="checkbox" id="' + esc(t.id) + '"' + (t.done ? ' checked' : '') + '>' +
                '<label for="' + esc(t.id) + '">' + esc(t.title) + '</label>' +
                '<span class="task-entity-dot" style="background:' + entityColor(t.entity) + '"></span></div>';
        });
        html += '</div>';
    }
    body.innerHTML = html;
}

function renderComms(d) {
    var body = document.getElementById('comms-body');
    var badgeEl = document.getElementById('comms-badge');
    if (!body) return;
    var c = d.comms || {};
    var digest = c.digest || {};

    if (badgeEl) badgeEl.textContent = (digest.total_unread || 0) + ' unread';

    var html = '';

    // Digest stats
    var byChannel = digest.by_channel || {};
    var channels = Object.keys(byChannel);
    if (channels.length) {
        html += '<div class="digest-visual">';
        channels.forEach(function(ch) {
            html += '<div class="digest-stat"><div class="digest-stat-val">' + byChannel[ch] + '</div>' +
                '<div class="digest-stat-label">' + ch + '</div></div>';
        });
        html += '</div>';
    }

    // Themes
    var themes = digest.themes || [];
    if (themes.length) {
        html += '<div class="digest-themes">';

function renderBrief(d) {
    var container = document.getElementById('brief-topics-container');
    var fallback = document.getElementById('brief-narrative');
    var timeEl = document.getElementById('brief-time');

    if (timeEl && d.generated_at) {
        var dt = new Date(d.generated_at);
        timeEl.textContent = dt.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) + ' CEST';
    }

    // --- Parse narrative from raw JSON if needed ---
    var narrative = d.brief_narrative || '';
    var topics = d.brief_topics || [];

    if (narrative && (narrative.indexOf('```') >= 0 || narrative.trim().charAt(0) === '{')) {
        try {
            var jsonStr = narrative.replace(/```json?\s*\n?/g, '').replace(/```/g, '').trim();
            var opens = (jsonStr.match(/\{/g)||[]).length, closes = (jsonStr.match(/\}/g)||[]).length;
            if (opens > closes) jsonStr += '}'.repeat(opens - closes);
            var parsed = JSON.parse(jsonStr);
            if (parsed.narrative) narrative = parsed.narrative;
            if (parsed.brief_topics && parsed.brief_topics.length) {
                topics = parsed.brief_topics;
                d.brief_topics = topics;
            }
        } catch(e) {
            var nm = narrative.match(/"narrative"\s*:\s*"((?:[^"\\]|\\.)*)"/);
            if (nm) narrative = nm[1].replace(/\\n/g, '\n').replace(/\\"/g, '"');
            else narrative = narrative.replace(/```json?\s*\n?/g, '').replace(/```/g, '').replace(/[{}"\[\]]/g, ' ').trim();
        }
    }

    // --- One-line summary for collapsed Ask Elly card ---
    var summaryEl = document.getElementById('brief-summary-line');
    if (summaryEl) {
        var urgCount = topics.filter(function(t) { return (t.urgency||'').toLowerCase() === 'red'; }).length;
        var total = topics.length;
        var bits = [];
        if (total) bits.push(total + (total===1?' topic':' topics'));
        if (urgCount) bits.push(urgCount + ' urgent');
        var tomorrowMeetings = ((d.schedule||{}).today || []).length;
        if (tomorrowMeetings) bits.push(tomorrowMeetings + ' mtg' + (tomorrowMeetings===1?'':'s') + ' today');
        summaryEl.textContent = bits.length ? bits.join(' · ') : 'Daily brief ready';
    }

    // --- Always show narrative summary at top ---
    if (fallback) {
        fallback.style.display = 'block';
        if (narrative && narrative.length > 5) {
            var formatted = narrative
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
            fallback.innerHTML = '<div style="font-size:13px;line-height:1.6;color:var(--text-secondary);margin-bottom:12px;">' + formatted + '</div>';
        } else {
            fallback.innerHTML = '';
        }
    }

    // --- Render topics as clickable dashboard cards ---
    if (topics.length && container) {
        var urgOrder = {red: 0, yellow: 1, green: 2};
        topics.sort(function(a,b) { return (urgOrder[a.urgency]||2) - (urgOrder[b.urgency]||2); });
        container.innerHTML = topics.map(function(t) {
            var urg = (t.urgency || 'green').toLowerCase();
            var ent = (t.entity || 'Personal').toLowerCase();
            var detailText = t.detail || t.summary || '';
            return '<div class="brief-topic urgency-' + urg + '" onclick="toggleTopic(this)" style="margin-bottom:10px;">' +
                '<div class="brief-topic-hdr">' +
                '<div class="brief-topic-dot ' + urg + '"></div>' +
                '<div class="brief-topic-title">' + esc(t.title || '') + '</div>' +
                '<div class="brief-topic-entity ' + ent + '">' + esc(t.entity || '') + '</div>' +
                '<div class="brief-topic-chevron">&#9660;</div>' +
                '</div>' +
                '<div class="brief-topic-summary">' + esc(t.summary || '') + '</div>' +
                '<div class="brief-topic-detail">' + esc(detailText) + '</div>' +
                '</div>';
        }).join('');
    } else if (container) {
        container.innerHTML = '';
    }
}

function briefChat() {
    var input = document.getElementById('brief-chat-msg');
    var replyEl = document.getElementById('brief-chat-reply');
    if (!input || !replyEl) return;
    var msg = (input.value || '').trim();
    if (!msg) return;
    var d = window.DASHBOARD_DATA || {};
    var syncUrl = d.sync_url;
    var syncKey = d.sync_key;
    if (!syncUrl || !syncKey) {
        replyEl.style.display = 'block';
        replyEl.innerHTML = '<div class="elly-label">ELLY</div>Sync config missing -- cannot reach brief_chat.';
        return;
    }
    input.disabled = true;
    replyEl.style.display = 'block';
    replyEl.innerHTML = '<div class="elly-label">ELLY</div>Thinking...';
    var briefCtx = {
        narrative: d.brief_narrative || '',
        topics: d.brief_topics || [],
        priorities: d.priorities || [],
        schedule_today: (d.schedule && d.schedule.today) ? d.schedule.today : [],
        tasks: (d.tasks || []).slice(0, 20),
        markets: d.markets || {},
        alerts: d.alerts || [],
        waiting_on: d.waiting_on || [],
        signals: (d.signals || []).slice(0, 10)
    };
    fetch(syncUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Sync-Key': syncKey },
        body: JSON.stringify({ action: 'brief_chat', message: msg, brief_context: briefCtx })
    }).then(function(r) {
        return r.json().then(function(data) { return { ok: r.ok, status: r.status, data: data }; })
            .catch(function() { return { ok: r.ok, status: r.status, data: null }; });
    }).then(function(res) {
        input.disabled = false;
        input.value = '';
        if (!res.ok) {
            replyEl.innerHTML = '<div class="elly-label">ELLY</div>Error (' + res.status + '): ' + esc(JSON.stringify(res.data || {}));
            return;
        }
        if (res.data && res.data.error) { replyEl.innerHTML = '<div class="elly-label">ELLY</div>Error: ' + esc(String(res.data.error)); return; }
            var reply = (res.data && (res.data.reply || res.data.message)) ? (res.data.reply || res.data.message) : 'No reply received.';
        replyEl.innerHTML = '<div class="elly-label">ELLY</div>' + esc(reply).replace(/\n/g, '<br>');
    }).catch(function(err) {
        input.disabled = false;
        replyEl.innerHTML = '<div class="elly-label">ELLY</div>Error reaching brief_chat: ' + esc(String(err));
    });
}

// PIPELINE (preserved from v14 -- ES5 safe)
// ==========================================

var COPILOT_CONFIG = {
    completionsKey: 'dailyCopilot_completions',
    capturesKeyPrefix: 'dailyCopilot_captures_',
    refreshKey: 'dailyCopilot_refreshRequested',
    dashboardVersion: 'v15',
    generatedAt: ''
};

var _ls = {
    ok: (function() { try { localStorage.setItem('_t','1'); localStorage.removeItem('_t'); return true; } catch(e) { return false; } })(),
    get: function(k) { try { return this.ok ? localStorage.getItem(k) : null; } catch(e) { return null; } },
    set: function(k, v) { try { if (this.ok) localStorage.setItem(k, v); } catch(e) {} },
    rm: function(k) { try { if (this.ok) localStorage.removeItem(k); } catch(e) {} }
};
var _dom = document.getElementById('__pipelineState');

function dualWrite(key, value) {
    _ls.set(key, value);
    if (_dom) {
        if (key === COPILOT_CONFIG.completionsKey) _dom.dataset.completions = value;
        else if (key.startsWith(COPILOT_CONFIG.capturesKeyPrefix)) _dom.dataset.captures = value;
        else if (key === COPILOT_CONFIG.refreshKey) _dom.dataset.refresh = value;
        _dom.dataset.lastModified = new Date().toISOString();
    }
}
function dualRead(key) {
    var lsVal = _ls.get(key);
    if (lsVal) return lsVal;
    if (!_dom) return null;
    if (key === COPILOT_CONFIG.completionsKey) return _dom.dataset.completions || null;
    if (key.startsWith(COPILOT_CONFIG.capturesKeyPrefix)) return _dom.dataset.captures || null;
    if (key === COPILOT_CONFIG.refreshKey) return _dom.dataset.refresh || null;
    return null;
}
function dualRemove(key) {
    _ls.rm(key);
    if (!_dom) return;
    if (key === COPILOT_CONFIG.completionsKey) _dom.dataset.completions = '[]';
    else if (key.startsWith(COPILOT_CONFIG.capturesKeyPrefix)) _dom.dataset.captures = '[]';
    else if (key === COPILOT_CONFIG.refreshKey) _dom.dataset.refresh = '';
}

function getCompletions() {
    try { return JSON.parse(dualRead(COPILOT_CONFIG.completionsKey) || '{"completions":[],"unchecked":[]}'); }
    catch(e) { return { completions: [], unchecked: [] }; }
}
function saveCompletions(data) {
    data.version = COPILOT_CONFIG.dashboardVersion;
    data.lastModified = new Date().toISOString();
    dualWrite(COPILOT_CONFIG.completionsKey, JSON.stringify(data));
}
function getTaskGroup(checkbox) {
    var g = checkbox.closest('.task-group');
    return g ? (g.querySelector('.task-group-title') || {}).textContent || 'Unknown' : 'Unknown';
}
function handleTaskToggle(checkbox) {
    var taskId = checkbox.id;
    var label = (checkbox.nextElementSibling || {}).textContent || taskId;
    var group = getTaskGroup(checkbox);
    var data = getCompletions();
    var item = checkbox.closest('.task-item');
    if (checkbox.checked) {
        if (!data.completions.find(function(c) { return c.taskId === taskId; })) {
            data.completions.push({ taskId: taskId, label: label, group: group, completedAt: new Date().toISOString() });
        }
        data.unchecked = (data.unchecked || []).filter(function(u) { return u.taskId !== taskId; });
        if (item) { item.classList.add('completing'); setTimeout(function() { item.classList.remove('completing'); }, 500); }
        syncToAzure(taskId, label, 'complete_task');
    } else {
        data.completions = data.completions.filter(function(c) { return c.taskId !== taskId; });
        if (!data.unchecked) data.unchecked = [];
        data.unchecked.push({ taskId: taskId, label: label, group: group, uncheckedAt: new Date().toISOString() });
    }
    saveCompletions(data);
    syncDOMState();
    updateTaskUI();
}
function updateTaskUI() {
    var cbs = document.querySelectorAll('.task-item input[type="checkbox"]');
    var total = cbs.length;
    var done = Array.from(cbs).filter(function(c) { return c.checked; }).length;
    var pct = total > 0 ? Math.round((done / total) * 100) : 0;

    var ringText = document.getElementById('taskRingText');
    if (ringText) ringText.textContent = pct + '%';

    var ringFill = document.querySelector('.task-ring-fill');
    if (ringFill) {
        var circumference = 2 * Math.PI * 24;
        ringFill.setAttribute('stroke-dashoffset', circumference - (pct / 100) * circumference);
    }

    var badge = document.getElementById('task-badge');
    if (badge) badge.textContent = done + '/' + total;
}
function restoreCompletions() {
    var data = getCompletions();
    if (data.completions && data.completions.length) {
        data.completions.forEach(function(c) { var cb = document.getElementById(c.taskId); if (cb) cb.checked = true; });
        updateTaskUI();
    }
}
function initTaskCheckboxes() {
    document.querySelectorAll('.task-item input[type="checkbox"]').forEach(function(cb) {
        cb.addEventListener('change', function() { handleTaskToggle(this); });
    });
    restoreCompletions();
    updateTaskUI();
}

var currentCaptureType = 'task';
function setCapture(type) {

function getCaptureStorageKey() { return COPILOT_CONFIG.capturesKeyPrefix + new Date().toISOString().split('T')[0]; }
function getCaptures() { try { return JSON.parse(dualRead(getCaptureStorageKey()) || '[]'); } catch(e) { return []; } }
function saveCapture(type, text) {
    var captures = getCaptures();
    captures.push({ type: type, text: text, timestamp: new Date().toISOString() });

function copyAllCaptures() {

    navigator.clipboard.writeText(md);
}

var _lastRefresh = 0;
function cosAction(action) {
    var btnIds = {refresh:'refreshBtn',stop:'stopBtn',resume:'resumeBtn'};
    var btn = document.getElementById(btnIds[action]);
    if (!btn) return;
    var d = window.DASHBOARD_DATA || {};
    var syncUrl = d.sync_url;
    var syncKey = d.sync_key;
    if (!syncUrl || !syncKey) { btn.textContent = 'No sync config'; return; }

    // Cooldown for refresh — GitHub Actions run is ~2-3 min, no point spamming
    if (action === 'refresh') {
        var now = Date.now();
        if (now - _lastRefresh < 30000) {
            btn.innerHTML = 'Wait ' + Math.ceil((30000 - (now - _lastRefresh)) / 1000) + 's…';
            setTimeout(function() { btn.innerHTML = '\u21bb Refresh'; btn.disabled = false; }, 2000);
            return;
        }
        _lastRefresh = now;
        btn.innerHTML = 'Rebuilding…';
        btn.disabled = true;
        fetch(syncUrl, {
            method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Sync-Key': syncKey },
            body: JSON.stringify({ action: 'refresh' })
        }).then(function(r) { return r.json().catch(function() { return {}; }); }).then(function(j) {
            if (j && j.success) {
                btn.innerHTML = 'Queued — reload in 3m';
                // Reload after the expected rebuild window so we pick up new DASHBOARD_DATA
                setTimeout(function() { location.reload(); }, (j.eta_seconds || 180) * 1000);
            } else {
                btn.innerHTML = (j && j.error) ? ('Err: ' + String(j.error).slice(0,24)) : 'Error';
                console.warn('Refresh failed', j);
                setTimeout(function() { btn.innerHTML = '\u21bb Refresh'; btn.disabled = false; }, 4000);
            }
        }).catch(function(err) {
            btn.innerHTML = 'Offline';
            console.warn('Refresh network error', err);
            setTimeout(function() { btn.innerHTML = '\u21bb Refresh'; btn.disabled = false; }, 3000);
        });
        return;
    }

    // Stop / Resume — writes /home/elly_pause.json, blocks/unblocks WhatsApp Elly and dashboard Elly
    btn.disabled = true;
    btn.textContent = action === 'stop' ? 'Stopping…' : 'Resuming…';
    fetch(syncUrl, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Sync-Key': syncKey },
        body: JSON.stringify({ action: action })
    }).then(function(r) { return r.json().catch(function() { return {ok: r.ok}; }); }).then(function(j) {
        var ok = j && (j.success || j.ok);
        if (ok) {
            btn.textContent = action === 'stop' ? 'Stopped ■' : 'Resumed ▶';
            setTimeout(function() {
                btn.textContent = action === 'stop' ? '■ Stop' : '▶ Resume';
                btn.disabled = false;
            }, 3000);
        } else {
            btn.textContent = (j && j.error) ? ('Err: ' + String(j.error).slice(0,20)) : 'Error';
            console.warn('cosAction failed', action, j);
            setTimeout(function() {
                btn.textContent = action === 'stop' ? '■ Stop' : '▶ Resume';
                btn.disabled = false;
            }, 4000);
        }
    }).catch(function(err) {
        btn.textContent = 'Offline';
        console.warn('cosAction network error', action, err);
        setTimeout(function() {
            btn.textContent = action === 'stop' ? '■ Stop' : '▶ Resume';
            btn.disabled = false;
        }, 3000);
    });
}

function syncToAzure(taskId, label, action) {
    var d = window.DASHBOARD_DATA || {};
    if (!d.sync_url || !d.sync_key) return;
    fetch(d.sync_url, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Sync-Key': d.sync_key },
        body: JSON.stringify({ action: action || 'complete_task', task_id: taskId, label: label, completed_at: new Date().toISOString() })
    }).catch(function() {});
}

function refreshDashboard() { cosAction('refresh'); }

function syncCompletions() {
    var REPO = 'eldemasgreco/cos-dashboard';
    var token = (typeof DASHBOARD_DATA !== 'undefined' && DASHBOARD_DATA.cos_control)
        ? DASHBOARD_DATA.cos_control.dispatch_token : '';
    var btn = document.getElementById('syncBtn');
    if (!btn) return;

    if (!token) {
        alert('No COS token available. Dashboard was rendered without dispatch token.');
        return;
    }

    var pipeline = window.__dailyCopilotPipeline;
    if (!pipeline) { alert('Pipeline not initialized'); return; }

    var completions = pipeline.getCompletions();
    var captures = pipeline.getCaptures();
    var hasData = (completions.completions && completions.completions.length) || (captures && captures.length);

    if (!hasData) {
        btn.innerHTML = 'Nothing to sync';
        setTimeout(function() { btn.innerHTML = '\u2191 Sync'; }, 2000);
        return;
    }

    var payload = JSON.stringify({
        completions: completions,
        captures: captures,
        synced_at: new Date().toISOString(),
        dashboard_version: COPILOT_CONFIG.dashboardVersion
    });

    btn.innerHTML = 'Syncing...';
    btn.disabled = true;

    var apiUrl = 'https://api.github.com/repos/' + REPO + '/contents/completions.json';
    var headers = {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
    };

    fetch(apiUrl, { headers: headers }).then(function(resp) {
        var sha = null;
        if (resp.ok) return resp.json().then(function(data) { sha = data.sha; return sha; });
        return null;
    }).then(function(sha) {
        var body = {
            message: 'Dashboard sync: ' + (completions.completions || []).length + ' completions, ' + (captures || []).length + ' captures',
            content: btoa(unescape(encodeURIComponent(payload)))
        };
        if (sha) body.sha = sha;
        return fetch(apiUrl, { method: 'PUT', headers: headers, body: JSON.stringify(body) });
    }).then(function(resp) {
        if (resp.ok) {
            btn.innerHTML = '\u2713 Synced';
            btn.style.opacity = '0.7';
            pipeline.clearCompletions();
            pipeline.clearCaptures();
        } else {
            btn.innerHTML = '\u2717 Failed (' + resp.status + ')';
        }
        setTimeout(function() { btn.innerHTML = '\u2191 Sync'; btn.disabled = false; btn.style.opacity = '1'; }, 3000);
    }).catch(function(err) {
        btn.innerHTML = '\u2717 Error';
        console.error('Sync error', err);
        setTimeout(function() { btn.innerHTML = '\u2191 Sync'; btn.disabled = false; }, 3000);
    });
}

function syncDOMState() {
    if (!_dom) return;
    _dom.dataset.completions = JSON.stringify(getCompletions());
    _dom.dataset.captures = JSON.stringify(getCaptures());
    _dom.dataset.lastModified = new Date().toISOString();
}
function readDOMState() {
    var completions = [];
    document.querySelectorAll('.task-item input[type="checkbox"]:checked').forEach(function(cb) {
        completions.push({
            taskId: cb.id,
            label: (cb.nextElementSibling || {}).textContent || cb.id,
            group: (cb.closest('.task-group') || {}).querySelector ? ((cb.closest('.task-group').querySelector('.task-group-title') || {}).textContent || 'Unknown') : 'Unknown',
            completedAt: (_dom || {}).dataset ? _dom.dataset.lastModified : new Date().toISOString()
        });
    });
    var captures = [];
    try { captures = JSON.parse((_dom || {}).dataset ? _dom.dataset.captures || '[]' : '[]'); } catch(e) {}
    var refresh = null;
    try { var r = (_dom || {}).dataset ? _dom.dataset.refresh : null; if (r) refresh = JSON.parse(r); } catch(e) {}
    return { completions: { completions: completions, unchecked: [] }, captures: captures, refresh: refresh };
}
function exportAllPipelineData() {
    var lsData = {
        captures: getCaptures(), completions: getCompletions(),
        exportedAt: new Date().toISOString(), dashboardVersion: COPILOT_CONFIG.dashboardVersion,
        source: 'localStorage', localStorageAvailable: _ls.ok
    };
    if (lsData.completions.completions.length > 0 || lsData.captures.length > 0) return JSON.stringify(lsData, null, 2);
    var domData = readDOMState();
    return JSON.stringify({
        captures: domData.captures, completions: domData.completions, refresh: domData.refresh,
        exportedAt: new Date().toISOString(), dashboardVersion: COPILOT_CONFIG.dashboardVersion,
        source: 'dom-fallback', localStorageAvailable: _ls.ok
    }, null, 2);
}

// ==========================================
// INIT
// ==========================================
document.addEventListener('DOMContentLoaded', function() {
    renderAll();
    initTaskCheckboxes();
    updateCaptureCount();
    syncDOMState();

    var captureInput = document.getElementById('captureInput');
    if (captureInput) captureInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') submitCapture(); });

    window.__dailyCopilotPipeline = {
        exportAll: function() { return exportAllPipelineData(); },
        exportFromDOM: function() { return JSON.stringify(readDOMState()); },
        getCompletions: function() { return getCompletions(); },
        getCaptures: function() { return getCaptures(); },
        readDOMState: function() { return readDOMState(); },
        getRefreshRequest: function() {
            try { var ls = _ls.get(COPILOT_CONFIG.refreshKey); if (ls) return JSON.parse(ls); } catch(e) {}
            try { var d = _dom ? _dom.dataset.refresh : null; if (d) return JSON.parse(d); } catch(e) {}
            return null;
        },
        clearCompletions: function() {
            dualRemove(COPILOT_CONFIG.completionsKey);
            document.querySelectorAll('.task-item input[type="checkbox"]').forEach(function(cb) { cb.checked = false; });
            updateTaskUI();
        },
        clearCaptures: function() { dualRemove(getCaptureStorageKey()); },
        clearRefreshFlag: function() { dualRemove(COPILOT_CONFIG.refreshKey); },
        clearAll: function() {
            dualRemove(COPILOT_CONFIG.completionsKey);
            dualRemove(getCaptureStorageKey());
            dualRemove(COPILOT_CONFIG.refreshKey);
        },
        storageStatus: function() { return { localStorageAvailable: _ls.ok, domStatePresent: !!_dom, version: COPILOT_CONFIG.dashboardVersion }; }
    };
});
</script>

<script>
/* ===== V6 CHROME JS ===== */
(function(){
  var TZ_OPTIONS = [
    'Europe/Madrid','Europe/London','America/New_York','America/Los_Angeles',
    'America/Chicago','America/Denver','Asia/Dubai','Asia/Karachi','Asia/Kolkata',
    'Asia/Singapore','Asia/Tokyo','Australia/Sydney','Pacific/Auckland','UTC'
  ];

  function syncInfo(){ var d=window.DASHBOARD_DATA||{}; return {url:d.sync_url,key:d.sync_key}; }
  function postSync(body){
    var s=syncInfo(); if(!s.url||!s.key) return Promise.reject(new Error('no sync config'));
    return fetch(s.url,{method:'POST',headers:{'Content-Type':'application/json','X-Sync-Key':s.key},body:JSON.stringify(body||{})})
      .then(function(r){return r.json().catch(function(){return {};});});
  }
  window.postSync = postSync;

  /* Toast */
  window.showToast = function(msg){ var t=document.getElementById('toast'); if(!t) return; t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},1800); };

  /* Time in header */
  function tickTime(){
    var tz=(window.__cosTz||'Europe/Madrid');
    try{
      var now=new Date();
      var s=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:tz});
      var el=document.getElementById('hdrTime'); if(el) el.textContent=s;
    }catch(e){}
  }
  setInterval(tickTime,10000); tickTime();

  /* TZ dropdown */
  window.toggleTz = function(ev){
    ev && ev.stopPropagation();
    var dd=document.getElementById('tzDD'); if(!dd) return;
    if(!dd.dataset.built){
      dd.innerHTML = TZ_OPTIONS.map(function(tz){ return '<div class="tz-opt" data-tz="'+tz+'" onclick="selectTz(event,\''+tz+'\')">'+tz+'</div>'; }).join('');
      dd.dataset.built='1';
    }
    dd.classList.toggle('open');
    if(dd.classList.contains('open')){
      var cur=window.__cosTz||'Europe/Madrid';
      dd.querySelectorAll('.tz-opt').forEach(function(n){ n.classList.toggle('sel', n.dataset.tz===cur); });
    }
  };
  document.addEventListener('click', function(ev){
    var w=document.querySelector('.tz-wrap'); var dd=document.getElementById('tzDD');
    if(w && dd && !w.contains(ev.target)) dd.classList.remove('open');
  });
  window.selectTz = function(ev,tz){
    ev && ev.stopPropagation();
    window.__cosTz=tz;
    var lbl=document.getElementById('tzLabel'); if(lbl) lbl.textContent=tz;
    var dd=document.getElementById('tzDD'); if(dd) dd.classList.remove('open');
    tickTime();
    postSync({action:'set_timezone', timezone:tz}).then(function(){ showToast('Timezone saved: '+tz); }).catch(function(){ showToast('TZ save failed (offline)'); });
  };

  /* Live pill (stop/resume) */
  window.toggleLive = function(){
    var pill=document.getElementById('livePill'); if(!pill) return;
    var paused=pill.classList.contains('paused');
    var action = paused?'resume':'stop';
    postSync({action:action}).then(function(){
      pill.classList.toggle('paused');
      document.getElementById('livePillTxt').textContent = paused?'Live':'Paused';
      document.getElementById('stopBtn').style.display   = paused?'':'none';
      document.getElementById('resumeBtn').style.display = paused?'none':'';
      showToast(paused?'Elly resumed':'Elly paused');
    }).catch(function(){ showToast('Toggle failed'); });
  };

  /* FAB / Elly panel */
  window.toggleEllyPanel = function(){
    var p=document.getElementById('ellyPanel'); if(!p) return;
    p.classList.toggle('open');
    if(p.classList.contains('open')){ var inp=document.getElementById('captureInput'); if(inp) setTimeout(function(){inp.focus();},50); }
  };

  /* Drawer */
  window.openDrawer = function(title,html){
    document.getElementById('drawerTitle').textContent=title||'Details';
    document.getElementById('drawerBody').innerHTML=html||'';
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawerBack').classList.add('open');
  };
  window.closeDrawer = function(){
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerBack').classList.remove('open');
  };

  /* Rail tab switch */
  window.switchRail = function(ev){
    var btn=ev.target.closest('.rail-tab'); if(!btn) return;
    var pane=btn.dataset.pane;
    document.querySelectorAll('.rail-tab').forEach(function(b){b.classList.remove('active');});
    document.querySelectorAll('.rail-pane').forEach(function(p){p.classList.remove('active');});
    btn.classList.add('active');
    var el=document.getElementById(pane); if(el) el.classList.add('active');
  };

  /* Weather / status-pill mirror (reads DASHBOARD_DATA on each render) */
  function mirrorHeader(){
    var d=window.DASHBOARD_DATA||{};
    if(d.weather){
      var w=d.weather;
      var t=document.getElementById('wxTemp'); if(t) t.textContent=(w.temp==null?'—':w.temp+'°');
      var c=document.getElementById('wxCond'); if(c) c.textContent=w.condition||'';
      var h=document.getElementById('wxHi'); if(h) h.textContent=(w.high==null?'—':w.high+'°');
      var l=document.getElementById('wxLo'); if(l) l.textContent=(w.low==null?'—':w.low+'°');
      var loc=document.getElementById('weather-loc'); if(loc) loc.textContent=w.location||'';
    }
    if(d.system){
      var s=d.system;
      var t1=document.getElementById('pill-scenarios-txt'); if(t1 && s.scenarios_live!=null) t1.textContent=s.scenarios_live+' scenarios';
      var pe=document.getElementById('pill-errors'); var t2=document.getElementById('pill-errors-txt');
      if(pe && t2 && s.errors_24h!=null){
        t2.textContent=s.errors_24h+' errors 24h';
        pe.classList.remove('ok','warn','err');
        pe.classList.add(s.errors_24h===0?'ok':(s.errors_24h<5?'warn':'err'));
      }
      var t3=document.getElementById('pill-lastrun-txt');
      if(t3 && s.last_s21_run){ try{ var dt=new Date(s.last_s21_run); t3.textContent='Last S21 '+dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }catch(e){} }
    }
    if(d.user_timezone){ window.__cosTz=d.user_timezone; var l=document.getElementById('tzLabel'); if(l) l.textContent=d.user_timezone; }
  }
  /* wrap renderAll if present so our mirror runs after the v15 renderers paint */
  if(typeof window.renderAll==='function'){
    var __rAll=window.renderAll;
    window.renderAll=function(){ var r=__rAll.apply(this,arguments); try{ mirrorHeader(); }catch(e){} return r; };
  }
  /* also run once at DOM ready in case renderAll was fired before this wrap */
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', mirrorHeader);
  else mirrorHeader();

  /* fabBtn / livePill / pills keyboard safety */
  document.addEventListener('keydown', function(ev){
    if(ev.key==='Escape'){
      var p=document.getElementById('ellyPanel'); if(p && p.classList.contains('open')) p.classList.remove('open');
      var dr=document.getElementById('drawer'); if(dr && dr.classList.contains('open')) closeDrawer();
      var dd=document.getElementById('tzDD'); if(dd) dd.classList.remove('open');
    }
  });
})();
</script>
</body>
